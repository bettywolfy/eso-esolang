function stringToEso(str) {
  if(!str.length) return "";
  if(str.length===1) return str[0].charCodeAt(0)+"$";
  const runic = str.split("").map(a => a.charCodeAt(0));
  let poi = runic[0];
  let out = runic[0]+"^$";
  for(let i = 1; i<runic.length; ++i) {
    const char = runic[i];
    const diff = char-poi;
    poi += diff;
    if(diff>0) {
      out += diff+"+";
    } else if(diff<0) {
      out += (-diff)+"-";
    }
    out += (i===runic.length-1?"":"^")+"$";
  }
  return out;
}

function encodeBase64(code) {
  code = new TextEncoder().encode(code);
  return code.toBase64({
    alphabet: "base64url",
    omitPadding: true
  });
}
function decodeBase64(code) {
  code = Uint8Array.fromBase64(
    code,
    { alphabet: "base64url" }
  );
  return new TextDecoder().decode(code);
}

/* eso interpreter */
function tokenize(code) {
  const tokens = [];
  
  code = code.split("");
  while(code.length) {
    if(/\s/.test(code[0])) {
      let i = 0;
      while(i<code.length&&/\s/.test(code[i])) ++i;
      code.splice(0, i);
      continue;
    }
    if(code[0]==="¢") {
      let i = 0;
      while(i<code.length&&code[i]!=="\n") ++i;
      if(code[i]==="\n") ++i;
      code.splice(0, i);
      continue;
    }
    if(/[0-9]/.test(code[0])) {
      let i = 0;
      while(i<code.length&&/[0-9]/.test(code[i])) ++i;
      const val = code.splice(0, i).join("");
      tokens.push({ type: "num", val });
      continue;
    }
    if("$#!?+-*/%|~^v&:;.@><o".includes(code[0])) {
      tokens.push({ type: code[0] });
      code.splice(0, 1);
      continue;
    }
    
    if(code[0]==="[") {
      code.splice(0, 1);
      let i = 0, depth = 1;
      while(i<code.length&&depth) {
        if(code[i]==="[") ++depth;
        else if(code[i]==="]") --depth;
        ++i;
      }
      const body = "["+code.splice(0, i).join("");
      if(depth) throw new Error("unmatched pair of brackets → "+body.slice(0, 20));
      tokens.push({ type: "loop", body: tokenize(body.slice(1, -1)) });
      continue;
    }
    if(code[0]==="(") {
      code.splice(0, 1);
      let i = 0, depth = 1;
      while(i<code.length&&depth) {
        if(code[i]==="(") ++depth;
        else if(code[i]===")") --depth;
        ++i;
      }
      const body = "("+code.splice(0, i).join("");
      if(depth) throw new Error("unmatched pair of parenthesis → "+body.slice(0, 20));
      tokens.push({ type: "group", body: tokenize(body.slice(1, -1)) });
      continue;
    }
    throw new Error("invalid symbol → "+code[0]);
  }
  return tokens;
}

async function eso(code) {
  let stdout = "", popst = [];
  const stack = [];
  
  function binop(i) {
    if(stack.length<2) {
      throw new Error("expected 2 operands for binary operation.");
    }
    stack.push(i(stack.pop(), stack.pop()));
  }
  function unaop(i) {
    if(stack.length<1) {
      throw new Error("expected a value for unary operation.");
    }
    const l = stack.length-1;
    stack[l] = i(stack[l]);
  }
  
  async function interpret(op) {
    switch(op.type) {
      // language
      case "num": {
        stack.push(BigInt(parseInt(op.val)));
        return;
      }
      case "loop": {
        while(stack.length&&stack[stack.length-1]) {
          for(const op2 of op.body)
            await interpret(op2);
        }
        return;
      }
      case "group": {
        let i = 1, j = popst.length+1;
        const backup = popst;
        popst = [];
        for(const op2 of op.body) {
          await interpret(op2);
        }
        popst = backup;
        break;
      }
      
      // stdin
      case "?": {
        let u;
        try {
          u = BigInt(await prompt(stdout));
        } catch(e) {
          u = 0n;
        }
        stack.push(u);
        break;
      }
      case "!": {
        let u = await prompt(stdout);
        if(!u.length) {
          stack.push(0n);
          break;
        }
        for(let i = 0; i<u.length; ++i) {
          stack.push(BigInt(u.codePointAt(i)));
        }
        stack.push(BigInt(u.length));
        break;
      }
      
      // stdout
      case "#": {
        if(stack.length) {
          stdout += stack.pop();
          break;
        }
        throw new Error("expected value to print.");
      }
      case "o": {
        stdout += stack.join(" ");
        return;
      }
      case "$": {
        if(stack.length) {
          stdout += String.fromCodePoint(Number(stack.pop()));
          break;
        }
        throw new Error("expected value to print.");
      }
      
      // operations
      case "+": binop((i, j) => i+j); break;
      case "-": binop((i, j) => j-i); break;
      case "*": binop((i, j) => i*j); break;
      case "/": binop((i, j) => j/i); break;
      case "%": binop((i, j) => j%i); break;
      case "~": unaop(i => i===0n?1n:0n); break;
      case "|": unaop(i => i<0n?-i:i); break;
      
      // stack
      case "@":
        stack.push(BigInt((2*Math.random())|0));
        break;
      case "v":
        stack.pop();
        break;
      case "&": {
        if(!stack.length) {
          throw new Error("expected value to pop.");
        }
        popst.push(stack.pop());
        return;
      }
      case "^": {
        if(!stack.length) {
          throw new Error("expected value to duplicate.");
        }
        stack.push(stack[stack.length-1]);
        break;
      }
      case ":": {
        if(stack.length<2) {
          throw new Error("expected at least 2 values to swap.");
        }
        const l = stack.length-1;
        const u = stack[l];
        stack[l] = stack[l-1];
        stack[l-1] = u;
        break;
      }
      case ";": {
        if(stack.length<2) {
          throw new Error("expected at least 2 values.");
        }
        const d1 = Number(stack.pop());
        const d2 = Number(stack.pop());
        const l = stack.length;
        if(l+1<=d1||l+1<=d2||d1<1||d2<1||d1===d2) {
          throw new Error("can not swap at depth "+d1+" and "+d2);
        }
        const idx0 = l-d1, idx1 = l-d2;
        const u = stack[idx0];
        stack[idx0] = stack[idx1];
        stack[idx1] = u;
        break;
      }
      case ".": {
        if(!stack.length) {
          throw new Error("expected value to reverse.");
        }
        const size = Number(stack.pop());
        if(stack.length<size) {
          throw new Error("expected "+size+" values to reverse.");
        }
        const original = stack.splice(stack.length-size, stack.length);
        stack.push(...original.reverse());
        break;
      }
      case ">": {
        if(!stack.length) {
          throw new Error("expected value to depth.");
        }
        const depth = Number(stack.pop());
        const l = stack.length;
        if(depth>l) {
          throw new Error("expected at least "+depth+" to push up.");
        }
        stack.push(...stack.splice(l-depth, 1));
        break;
      }
      case "<": {
        if(!stack.length) {
          throw new Error("expected value to depth.");
        }
        const depth = Number(stack.pop());
        const l = stack.length;
        if(depth>l) {
          throw new Error("expected at least "+depth+" to push down.");
        }
        stack.splice(l-depth, 0, stack.pop());
        break;
      }
    }
    if(popst.length) {
      stack.push(...popst.splice(0).reverse());
    }
  }
  
  try {
    for(const op of tokenize(code))
      await interpret(op);
  } catch(e) {
    if(stdout.length) stdout += "\n\n――――――――――――――――――――\n\n";
    return stdout+e.toString();
  }
  if(stdout.length) stdout += "\n\n――――――――――――――――――――\n\n";
  return stdout+"closed with stack at "+stack.length;
}
